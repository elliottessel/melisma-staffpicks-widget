<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <title>Staff Picks Widget</title>
  <style>
    #staff-picks {
        font-family: inherit;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
        width: 100%;
    }

    .sp-heading {
    font-size: 13px;
    text-transform: lowercase;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 16px;
    }

    .pick-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: fit-content;
    }

    .pick-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 4px;
    grid-column: 1;
    grid-row: 1;
    }

    .pick-text {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    }


    .pick-main {
    text-align: left;
    }

    .pick-side {
    text-align: right;
    }

    .pick-album {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: capitalize;
    }

    .pick-artist {
    font-size: 12px;
    color: black;
    margin: 0 0 4px;
    text-transform: capitalize;
    }

    .pick-writer {
    font-size: 11px;
    color: black;
    margin: 0;
    text-transform: capitalize;
    }

    .pick-role {
    font-size: 11px;
    color: black;
    margin: 0;
    text-transform: capitalize;
    }

    .pick-LIYL {
    display: none;
    }
  </style>
</head>
<body>
  <div id="staff-picks"></div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9Yj8QViaxbez9J9eS-5boup_9sWQ4Fg8s9r21NUZ924X4KXrjeyMgHyMYi6r0dJC0u7kNQdON_7Uc/pub?gid=1541089229&single=true&output=csv";

    // load staff picks into CSV format.
    async function loadPicks() {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();
        const data = parseCSV(csvText);
        buildCards(data);
    }

    function parseCSV(csvText) {
        const result = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        return result.data; 
    } 

    loadPicks();

    async function buildCards(data) {
        const container = document.getElementById("staff-picks");
  
        for (const pick of data.reverse().slice(0, 4)) {
            const imageUrl = await getAlbumArt(pick.artist, pick.album);
            console.log(imageUrl);
            const card = document.createElement("div");
            card.className = "pick-card";
            card.innerHTML = `
            <img src="${imageUrl}" alt="${pick.album}" />
            <div class="pick-text">
            <div class="pick-main">
                <p class="pick-album">${pick.album}</p>
                <p class="pick-artist">${pick.artist}</p>
            </div>
            <div class="pick-side">
                <p class="pick-writer">${pick.full_name}</p>
                <p class="pick-role">${pick.role}</p>
            </div>
            </div>
            `;
            container.appendChild(card);
        };
    }


    const LASTFM_API_KEY = "9f23f51e08a92835161fc86bf7b1d12b";

    async function getAlbumArt(artist, album) {
        let url;
        
        url = `https://ws.audioscrobbler.com/2.0/?method=album.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(album)}&format=json`;
        

        const response = await fetch(url);
        const data = await response.json();


        console.log("lastfm response:", data);
        console.log("images:", data.album?.image);
        return data.album?.image?.[3]["#text"] || null;
    }

  </script>

</body>
</html>
