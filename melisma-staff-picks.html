  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9Yj8QViaxbez9J9eS-5boup_9sWQ4Fg8s9r21NUZ924X4KXrjeyMgHyMYi6r0dJC0u7kNQdON_7Uc/pub?gid=0&single=true&output=csv";

    // load staff picks into CSV format.
    async function loadPicks() {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();
        const data = parseCSV(csvText);
        buildCards(data);
    }

    function parseCSV(csvText) {
        const result = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        return result.data; 
    } 

    loadPicks();

    async function buildCards(data) {
        const container = document.getElementById("staff-picks");
  
        for (const pick of data) {
            const imageUrl = await getAlbumArt(pick.artist, pick.title, pick.type);
            console.log(imageUrl);
            const card = document.createElement("div");
            card.className = "pick-card";
            card.innerHTML = `
            <img src="${imageUrl}" alt="${pick.album}" />
            <div class="pick-info">
                <p class="pick-title">${pick.title}</p>
                <p class="pick-artist">${pick.artist}</p>
                <p class="pick-LIYL">${pick.LIYL}</p>
                <p class="pick-writer">${pick.name}</p>
                <p class="pick-role">${pick.role}</p>
            </div>
            `;
            container.appendChild(card);
        };
    }


    const LASTFM_API_KEY = "9f23f51e08a92835161fc86bf7b1d12b";

    async function getAlbumArt(artist, title, type) {
        let url;
        if (type === "track") {
            url = `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(title)}&format=json`;
        } else {
            url = `https://ws.audioscrobbler.com/2.0/?method=album.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(title)}&format=json`;
        }

        const response = await fetch(url);
        const data = await response.json();

        if (type === "track") {
            return data.track?.album?.image?.[4]["#text"] || null;
        } else {
            console.log("lastfm response:", data);
            console.log("images:", data.album?.image);
            return data.album?.image?.[4]["#text"] || null;
        }
    }
